<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentKey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005885;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="enterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00a0dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077b5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0077b5" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Ambient glow behind keyboard -->
  <ellipse cx="640" cy="420" rx="420" ry="120" fill="#0077b5" opacity="0.08"/>

  <!-- === KEYBOARD === -->
  <!-- Keyboard base -->
  <rect x="200" y="310" width="880" height="240" rx="18" ry="18" fill="#111827" stroke="#1e293b" stroke-width="2"/>
  <rect x="208" y="318" width="864" height="224" rx="14" ry="14" fill="#0d1520"/>

  <!-- Row 1 keys -->
  <!-- ESC -->
  <rect x="228" y="334" width="52" height="44" rx="6" fill="url(#keyGrad)" stroke="#1e3a5f" stroke-width="1"/>
  <text x="254" y="362" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#4a6080" text-anchor="middle">ESC</text>

  <!-- Regular keys row 1 -->
  <rect x="290" y="334" width="44" height="44" rx="6" fill="url(#keyGrad)" stroke="#1e3a5f" stroke-width="1"/>
  <text x="312" y="362" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#4a6080" text-anchor="middle">1</text>

  <rect x="344" y="334" width="44" height="44" rx="6" fill="url(#keyGrad)" stroke="#1e3a5f" stroke-width="1"/>
